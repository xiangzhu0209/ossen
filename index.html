<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ossen記帳系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD9g8PjN39YeiR302NUbh5t--OZ5FnqS0A",
            authDomain: "ossen-fe1ac.firebaseapp.com",
            projectId: "ossen-fe1ac",
            storageBucket: "ossen-fe1ac.firebasestorage.app",
            messagingSenderId: "504652484858",
            appId: "1:504652484858:web:0c1a847d2e24b67e5f7943",
            measurementId: "G-Q52V0B3940",
            databaseURL: "https://ossen-fe1ac-default-rtdb.firebaseio.com/"
        };
        // 使用全域 firebase 物件，不需要 import
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        // 統一建立 fb 物件給 React 使用
        window.fb = { 
            db, 
            ref: (path) => db.ref(path), 
            onValue: (ref, cb) => ref.on('value', (s) => cb(s)),
            push: (ref, data) => ref.push(data),
            update: (ref, data) => ref.update(data),
            remove: (ref) => ref.remove()
        };
    </script>

    <style>
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: #f8fafc; }
        .admin-mode-container { min-width: 1400px; }
        .input-dark { background-color: #334155; color: white; border: 1px solid #475569; border-radius: 12px; padding: 12px; outline: none; font-size: 14px; }
        .label-tiny { font-size: 10px; color: #94a3b8; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .project-row { min-width: 1350px; }
        .project-row:hover .delete-btn { opacity: 1; }
        .delete-btn { transition: all 0.2s; opacity: 0; }
        .compact-row { padding: 12px 20px !important; border-radius: 16px !important; margin-bottom: 8px !important; }
        .boss-mode-container { padding-bottom: 80px; }
        .mobile-card { box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .status-unpaid { background-color: #e11d48 !important; color: white !important; border: 1px solid #be123c !important; }
        .status-master-collect { background-color: #2563eb !important; color: white !important; border: 1px solid #1d4ed8 !important; }
        .date-missing { background-color: #ffe4e6 !important; border: 2px solid #f43f5e !important; color: #881337 !important; }
        .lock-screen { background: radial-gradient(circle at center, #1e293b, #0f172a); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [isLocked, setIsLocked] = useState(true);
            const [password, setPassword] = useState("");
            const CORRECT_PASSWORD = "45688123"; 

            const handleLogin = () => {
                if (password.toString().trim() === CORRECT_PASSWORD) setIsLocked(false);
                else { alert("密碼錯誤！"); setPassword(""); }
            };
            
            const isBossMode = new URLSearchParams(window.location.search).get('mode') === 'boss';
            const [selectedMonth, setSelectedMonth] = useState(new Date().getMonth() + 1);
            const [selectedType, setSelectedType] = useState('公司件'); 
            const [filterStaff, setFilterStaff] = useState('全部');
            const [sortOption, setSortOption] = useState('date-desc');
            const [projects, setProjects] = useState([]);
            const [editingId, setEditingId] = useState(null);
            const [searchTerm, setSearchTerm] = useState("");
            const [filterStatus, setFilterStatus] = useState('all');
            const [showMobileFilters, setShowMobileFilters] = useState(false);

            const [formData, setFormData] = useState({ 
                client: '', deposit: 0, balance: 0, 
                orderDate: new Date().toISOString().split('T')[0], 
                staff: '公司', note: '', receipt: '未繳', installDate: '', report: ''
            });

            const getProjectStatus = (p) => {
                if (p.report === '有狀況') return "⚠️ 有狀況";
                if (!p.installDate) return "待確認";
                const today = new Date(); today.setHours(0,0,0,0);
                const install = new Date(p.installDate); install.setHours(0,0,0,0);
                return today >= install ? "完工" : "製作中";
            };

            const determineBalanceStatus = (balance, installDate, report) => {
                if (report === '有狀況') return '未完成';
                if (Number(balance) === 0) return '無尾款';
                if (!installDate) return '未完成';
                const today = new Date(); today.setHours(0,0,0,0);
                const install = new Date(installDate); install.setHours(0,0,0,0);
                return today >= install ? '未繳' : '未完成';
            };
            
            const getDisplayBStatus = (p) => {
                if (p.report === '有狀況') return '未完成';
                const paidStatuses = ['已轉帳', '已付現', '支票', '請款中', '師傅代收', '無尾款'];
                if (paidStatuses.includes(p.bStatus)) return p.bStatus;
                if (p.installDate) {
                    const today = new Date(); today.setHours(0,0,0,0);
                    const install = new Date(p.installDate); install.setHours(0,0,0,0);
                    return today >= install ? '未繳' : '未完成';
                }
                return '未完成';
            };

            useEffect(() => {
                const pRef = window.fb.ref('projects');
                window.fb.onValue(pRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const list = Object.keys(data).map(key => ({ ...data[key], firebaseId: key }));
                        setProjects(list.reverse()); 
                    } else { setProjects([]); }
                });
            }, []);

            const filteredAndSortedProjects = useMemo(() => {
                return projects.filter(p => {
                    if (searchTerm) {
                        const term = searchTerm.toLowerCase();
                        if (!(p.client || '').toLowerCase().includes(term) && !(p.note || '').toLowerCase().includes(term)) return false;
                    }
                    const month = new Date(p.orderDate).getMonth() + 1;
                    if (month !== selectedMonth || p.type !== selectedType || (filterStaff !== '全部' && p.staff !== filterStaff)) return false;

                    if (filterStatus === 'deposit') return p.dStatus === '未繳';
                    if (filterStatus === 'balance') return getDisplayBStatus(p) === '未繳';
                    if (filterStatus === 'master-collect') return getDisplayBStatus(p) === '師傅代收';
                    if (filterStatus === 'receipt') return p.receipt === '未繳';
                    if (filterStatus === 'report') return p.report === '有狀況';
                    if (filterStatus === 'no-install-date') return !p.installDate || p.installDate.trim() === '';
                    return true;
                }).sort((a, b) => {
                    if (sortOption === 'date-desc') return new Date(b.orderDate) - new Date(a.orderDate);
                    else if (sortOption === 'date-asc') return new Date(a.orderDate) - new Date(b.orderDate);
                    return 0;
                });
            }, [projects, selectedMonth, selectedType, filterStaff, sortOption, filterStatus, searchTerm]);

            const totalRevenue = useMemo(() => filteredAndSortedProjects.reduce((sum, p) => sum + (Number(p.deposit) || 0) + (Number(p.balance) || 0), 0), [filteredAndSortedProjects]);

            const handleSave = () => {
                if (isBossMode) return;
                if (!formData.client) return alert("請輸入客戶");
                const dStatus = Number(formData.deposit) === 0 ? '無訂金' : '未繳';
                const bStatus = determineBalanceStatus(formData.balance, formData.installDate, formData.report);
                if (editingId) {
                    window.fb.update(window.fb.ref(`projects/${editingId}`), { ...formData, dStatus, bStatus });
                    setEditingId(null);
                } else {
                    window.fb.push(window.fb.ref('projects'), { ...formData, dStatus, bStatus, type: selectedType });
                }
                const preservedDate = formData.orderDate;
                setFormData({ client: '', deposit: 0, balance: 0, orderDate: preservedDate, staff: '公司', note: '', receipt: '未繳', installDate: '', report: '' });
            };

            if (isLocked) {
                return (
                    <div className="h-screen w-screen flex items-center justify-center lock-screen px-4">
                        <div className="bg-white/10 backdrop-blur-xl p-8 rounded-[30px] shadow-2xl border border-white/20 text-center w-full max-w-sm">
                            <h2 className="text-white text-2xl font-black mb-6">OSSEN SYSTEM</h2>
                            <input type="password" placeholder="輸入密碼" inputMode="numeric" className="w-full bg-slate-800/50 border border-slate-700 rounded-2xl py-4 px-6 text-white text-center text-xl mb-6 outline-none focus:border-indigo-500" value={password} onChange={(e) => setPassword(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleLogin()} autoFocus />
                            <button onClick={handleLogin} className="w-full bg-indigo-600 active:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-lg transition-transform active:scale-95">進入系統</button>
                        </div>
                    </div>
                );
            }

            if (isBossMode) {
                return (
                    <div className="min-h-screen flex flex-col boss-mode-container bg-[#f1f5f9]">
                        <div className="bg-[#0f172a] text-white sticky top-0 z-30 shadow-md">
                            <div className="flex items-center justify-between px-4 py-3 border-b border-slate-700">
                                <div className="font-black text-lg">2026 / {selectedMonth}月</div>
                                <div className="text-xs bg-indigo-600 px-2 py-1 rounded-lg">總額 ${totalRevenue.toLocaleString()}</div>
                            </div>
                            <div className="p-2 bg-white border-b border-slate-200">
                                <div className="flex gap-2 mb-2">
                                    <input type="text" className="flex-1 bg-slate-100 border-none rounded-xl px-4 py-2 text-sm font-bold text-slate-700" placeholder="搜尋..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                    <button onClick={()=>setShowMobileFilters(!showMobileFilters)} className="px-4 py-2 rounded-xl bg-slate-800 text-white text-xs font-bold">篩選</button>
                                </div>
                                {showMobileFilters && (
                                    <div className="grid grid-cols-2 gap-2 text-xs font-bold">
                                        <button onClick={()=>setFilterStatus('all')} className="bg-slate-100 p-2 rounded-lg">全部</button>
                                        <button onClick={()=>setFilterStatus('master-collect')} className="bg-blue-100 text-blue-700 p-2 rounded-lg">師傅代收</button>
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="px-4 space-y-3 py-4">
                            {filteredAndSortedProjects.map(p => {
                                const bStatus = getDisplayBStatus(p);
                                return (
                                    <div key={p.firebaseId} className="bg-white rounded-2xl p-4 border border-slate-100">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="font-black">{p.client}</span>
                                            <span className="text-indigo-600 font-black">${(Number(p.deposit)+Number(p.balance)).toLocaleString()}</span>
                                        </div>
                                        <div className={`text-xs font-bold px-2 py-1 rounded ${bStatus==='師傅代收' ? 'bg-blue-500 text-white' : 'bg-slate-200'}`}>{bStatus}</div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden admin-mode-container">
                    <aside className="w-24 bg-[#0f172a] flex flex-col shrink-0">
                        <div className="p-4 text-white font-black text-center border-b border-slate-800">2026</div>
                        <div className="flex-1 overflow-y-auto p-2 space-y-1">
                            { [...Array(12).keys()].map(i => <button key={i+1} onClick={()=>setSelectedMonth(i+1)} className={`w-full py-3 rounded-lg font-bold text-xs ${selectedMonth===i+1?'bg-indigo-600 text-white':'text-slate-500'}`}>{i+1}月</button>)}
                        </div>
                    </aside>
                    <main className="flex-1 flex flex-col bg-white overflow-hidden">
                        <header className="px-10 py-4 flex justify-between items-center shrink-0 border-b">
                             <div className="flex gap-2">
                                <button onClick={()=>setFilterStatus('all')} className="bg-slate-200 px-3 py-1 rounded-lg text-xs font-bold">全部</button>
                                <button onClick={()=>setFilterStatus('master-collect')} className="bg-blue-200 px-3 py-1 rounded-lg text-xs font-bold">篩選師傅代收</button>
                             </div>
                             <button onClick={handleExportExcel} className="bg-emerald-600 text-white px-4 py-2 rounded-xl text-xs font-black">匯出報表</button>
                        </header>
                        <div className="flex-1 overflow-auto px-10 py-6 bg-slate-50">
                            <div className="space-y-2">
                                {filteredAndSortedProjects.map(p => {
                                    const bStatus = getDisplayBStatus(p);
                                    return (
                                        <div key={p.firebaseId} className="project-row compact-row bg-white border flex items-center">
                                            <div className="w-48 font-black">{p.client}</div>
                                            <div className="w-48 font-mono font-black">${(Number(p.deposit)+Number(p.balance)).toLocaleString()}</div>
                                            <select className={`text-[11px] font-bold rounded-lg px-2 py-1 ${bStatus === '師傅代收' ? 'status-master-collect' : 'bg-slate-50'}`} value={bStatus} onChange={e=>updateField(p.firebaseId, 'bStatus', e.target.value)}>
                                                <option>未完成</option><option>未繳</option><option>師傅代收</option><option>已轉帳</option><option>無尾款</option>
                                            </select>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
